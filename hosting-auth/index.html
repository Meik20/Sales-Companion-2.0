<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Companion 2.0 — Authentification</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0A0F0D;
            color: #E2E8F0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 400px;
            padding: 2rem;
            border: 1px solid #1B2C24;
            border-radius: 12px;
            background-color: #0D1512;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
        h1 {
            color: #2EE07A;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }
        p {
            color: #94A3B8;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .logo {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🟢</div>
        <h1>Sales Companion 2.0</h1>
        <p>Ce sous-domaine est configuré pour gérer de manière sécurisée les services d'authentification de l'application.</p>
    </div>
</body>
</html>
